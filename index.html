<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Godam Stock Management</title>
<style>
body { font-family: Arial, sans-serif; background: #f0f0f0; margin: 0; padding: 0; }
header { background: #4CAF50; color: white; padding: 10px; text-align: center; }
.container { max-width: 1000px; margin: auto; padding: 20px; background: white; }
input, select, button { padding: 8px; margin: 5px; }
table { width: 100%; border-collapse: collapse; margin-top: 10px; }
table, th, td { border: 1px solid #ddd; }
th, td { padding: 8px; text-align: center; }
button { cursor: pointer; }
.nav { margin-bottom: 10px; }
.nav button { background: #4CAF50; color: white; border: none; }
.alert { color: red; font-weight: bold; }
</style>
</head>
<body>

<header><h1>Godam Stock Management</h1></header>

<div class="container" id="loginScreen">
<h2>Login</h2>
<label>Username:</label><input type="text" id="username"><br>
<label>Password:</label><input type="password" id="password"><br>
<button onclick="login()">Login</button>
<p id="loginMsg" class="alert"></p>
</div>

<div class="container" id="dashboardScreen" style="display:none;">
<h2>Dashboard</h2>
<div class="nav">
<button onclick="showScreen('itemsScreen')">Items</button>
<button onclick="showScreen('transactionsScreen')">Transactions</button>
<button onclick="showScreen('reportsScreen')">Reports</button>
<button onclick="logout()">Logout</button>
</div>
<p>Total Items: <span id="totalItems">0</span></p>
<p>Total Value: <span id="totalValue">0</span></p>
<p>Low Stock Items: <span id="lowStock">0</span></p>
</div>

<div class="container" id="itemsScreen" style="display:none;">
<h2>Items Management</h2>
<label>Name:</label><input type="text" id="itemName">
<label>Category:</label><input type="text" id="itemCategory">
<label>Quantity:</label><input type="number" id="itemQty">
<label>Unit Price:</label><input type="number" id="itemPrice">
<label>Supplier:</label><input type="text" id="itemSupplier">
<button onclick="addItem()">Add / Save</button>
<table id="itemsTable">
<tr><th>Name</th><th>Category</th><th>Quantity</th><th>Unit Price</th><th>Supplier</th><th>Total</th><th>Action</th></tr>
</table>
<button onclick="showScreen('dashboardScreen')">Back to Dashboard</button>
</div>

<div class="container" id="transactionsScreen" style="display:none;">
<h2>Transactions</h2>
<label>Item:</label><select id="transItem"></select>
<label>Type:</label>
<select id="transType">
<option>Incoming</option>
<option>Outgoing</option>
</select>
<label>Quantity:</label><input type="number" id="transQty">
<label>Notes:</label><input type="text" id="transNotes">
<button onclick="addTransaction()">Save Transaction</button>
<table id="transTable">
<tr><th>Date</th><th>Item</th><th>Type</th><th>Quantity</th><th>Notes</th></tr>
</table>
<button onclick="showScreen('dashboardScreen')">Back to Dashboard</button>
</div>

<div class="container" id="reportsScreen" style="display:none;">
<h2>Reports</h2>
<button onclick="showCurrentStock()">Current Stock</button>
<button onclick="showTransactions()">Transactions</button>
<button onclick="showLowStock()">Low Stock</button>
<table id="reportsTable">
<tr><th>Name</th><th>Category</th><th>Quantity</th><th>Unit Price</th><th>Total</th></tr>
</table>
<button onclick="showScreen('dashboardScreen')">Back to Dashboard</button>
</div>

<script>
let items = JSON.parse(localStorage.getItem('items')) || [];
let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

function login() {
    let user = document.getElementById('username').value;
    let pass = document.getElementById('password').value;
    if(user==='admin' && pass==='1234'){
        document.getElementById('loginScreen').style.display='none';
        document.getElementById('dashboardScreen').style.display='block';
        updateDashboard();
    }else{
        document.getElementById('loginMsg').innerText='Invalid Credentials';
    }
}

function logout() {
    showScreen('loginScreen');
}

function showScreen(screenId){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('dashboardScreen').style.display='none';
    document.getElementById('itemsScreen').style.display='none';
    document.getElementById('transactionsScreen').style.display='none';
    document.getElementById('reportsScreen').style.display='none';
    document.getElementById(screenId).style.display='block';
    if(screenId==='itemsScreen') updateItemsTable();
    if(screenId==='transactionsScreen') updateTransactionsTable();
}

function addItem(){
    let name=document.getElementById('itemName').value;
    let cat=document.getElementById('itemCategory').value;
    let qty=parseInt(document.getElementById('itemQty').value);
    let price=parseFloat(document.getElementById('itemPrice').value);
    let sup=document.getElementById('itemSupplier').value;
    let total = qty*price;
    items.push({name,cat,qty,price,sup,total});
    localStorage.setItem('items',JSON.stringify(items));
    updateItemsTable();
    updateDashboard();
}

function updateItemsTable(){
    let table=document.getElementById('itemsTable');
    table.innerHTML='<tr><th>Name</th><th>Category</th><th>Quantity</th><th>Unit Price</th><th>Supplier</th><th>Total</th><th>Action</th></tr>';
    items.forEach((i,index)=>{
        let row=table.insertRow();
        row.insertCell(0).innerText=i.name;
        row.insertCell(1).innerText=i.cat;
        row.insertCell(2).innerText=i.qty;
        row.insertCell(3).innerText=i.price;
        row.insertCell(4).innerText=i.sup;
        row.insertCell(5).innerText=i.total;
        row.insertCell(6).innerHTML=<button onclick="deleteItem(${index})">Delete</button>;
    });
    updateTransDropdown();
}

function deleteItem(index){
    items.splice(index,1);
    localStorage.setItem('items',JSON.stringify(items));
    updateItemsTable();
    updateDashboard();
}

function updateTransDropdown(){
    let dd=document.getElementById('transItem');
    dd.innerHTML='';
    items.forEach((i)=>{ dd.innerHTML+=<option>${i.name}</option>; });
}

function addTransaction(){
    let itemName=document.getElementById('transItem').value;
    let type=document.getElementById('transType').value;
    let qty=parseInt(document.getElementById('transQty').value);
    let notes=document.getElementById('transNotes').value;
    let date=new Date().toLocaleDateString();
    transactions.push({date,itemName,type,qty,notes});
    localStorage.setItem('transactions',JSON.stringify(transactions));
    let item=items.find(i=>i.name===itemName);
    if(type==='Incoming') item.qty+=qty;
    else if(type==='Outgoing') item.qty-=qty;
    item.total=item.qty*item.price;
    localStorage.setItem('items',JSON.stringify(items));
    updateTransactionsTable();
    updateItemsTable();
    updateDashboard();
}

function updateTransactionsTable(){
    let table=document.getElementById('transTable');
    table.innerHTML='<tr><th>Date</th><th>Item</th><th>Type</th><th>Quantity</th><th>Notes</th></tr>';
    transactions.forEach(t=>{
        let row=table.insertRow();
        row.insertCell(0).innerText=t.date;
        row.insertCell(1).innerText=t.itemName;
        row.insertCell(2).innerText=t.type;
        row.insertCell(3).innerText=t.qty;
        row.insertCell(4).innerText=t.notes;
    });
}

function updateDashboard(){
    document.getElementById('totalItems').innerText=items.length;
    let val=items.reduce((a,i)=>a+i.total,0);
    document.getElementById('totalValue').innerText=val;
    let low=items.filter(i=>i.qty<10).length;
    document.getElementById('lowStock').innerText=low;
}

function showCurrentStock(){
    let table=document.getElementById('reportsTable');
    table.innerHTML='<tr><th>Name</th><th>Category</th><th>Quantity</th><th>Unit Price</th><th>Total</th></tr>';
    items.forEach(i=>{
        let row=table.insertRow();
        row.insertCell(0).innerText=i.name;
        row.insertCell(1).innerText=i.cat;
        row.insertCell(2).innerText=i.qty;
        row.insertCell(3).innerText=i.price;
        row.insertCell(4).innerText=i.total;
    });
}

function showTransactions(){
    let table=document.getElementById('reportsTable');
    table.innerHTML='<tr><th>Date</th><th>Item</th><th>Type</th><th>Quantity</th><th>Notes</th></tr>';
    transactions.forEach(t=>{
        let row=table.insertRow();
        row.insertCell(0).innerText=t.date;
        row.insertCell(1).innerText=t.itemName;
        row.insertCell(2).innerText=t.type;
        row.insertCell(3).innerText=t.qty;
        row.insertCell(4).innerText=t.notes;
    });
}

function showLowStock(){
    let table=document.getElementById('reportsTable');
    table.innerHTML='<tr><th>Name</th><th>Category</th><th>Quantity</th><th>Unit Price</th><th>Total</th></tr>';
    items.filter(i=>i.qty<10).forEach(i=>{
        let row=table.insertRow();
        row.insertCell(0).innerText=i.name;
        row.insertCell(1).innerText=i.cat;
        row.insertCell(2).innerText=i.qty;
        row.insertCell(3).innerText=i.price;
        row.insertCell(4).innerText=i.total;
    });
}
</script>

</body>
</html>
